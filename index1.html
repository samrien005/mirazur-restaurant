<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Table Now</title>
    <link rel="stylesheet" href="ss.css">
</head>
<body>
<div class="booking-img">
<div class="wrapper">
    <div class="title">
      Book Your Table Now!
    </div>
    <div class="form">
       <div class="inputfield">
          <label>First Name</label>
          <input type="text" class="input">
       </div>  
        <div class="inputfield">
          <label>Last Name</label>
          <input type="text" class="input">
       </div>  
       <div class="inputfield">
          <label>Date</label>
          <input type="date" class="input" required >
       </div>  
      <div class="inputfield">
          <label>Time</label>
          <input type="Time" class="input" required >
       </div> 
        <div class="inputfield">
          <label>Cuisine</label>
          <div class="custom_select">
            <select>
              <option value="">Select</option>
              <option value="male">INDIAN</option>
              <option value="female">ASIAN</option>
              <option value="female">CHINESE</option>
              <option value="female">MEXICAN</option>
              <option value="female">ITALIAN</option>
              <option value="female">TURKISH</option>
            </select>
          </div>
       </div> 
       <div class="inputfield">
        <label>Noof Guests</label>
        <input type="text" class="input" required>
     </div> 
        <div class="inputfield">
          <label>Email Address-</label>
          <input type="text" class="input">
       </div> 
      <div class="inputfield">
          <label>Phone Number</label>
          <input type="text" class="input">
       </div> 
      <div class="inputfield">
          <label>special request</label>
          <textarea class="textarea"></textarea>
       </div> 
      
      <div class="inputfield terms">
          <label class="check">
            <input type="checkbox">
            <span class="checkmark"></span>
          </label>
          <p>Agreed to terms and conditions</p>
       </div> 
      <div class="inputfield" id="register-btn">
        <input type="submit" value="Confirm Booking" class="btn">
      </div>
    </div>
</div>  
</div>
    
</body>
</html>
